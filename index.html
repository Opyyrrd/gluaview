<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gluaview</title>
    <style>
        body {
            margin: 0;
            background-color: #1e1e1e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #editor-container {
            width: 45%;
            background-color: #2d2d2d;
            display: flex;
            flex-direction: column;
            border-right: 3px solid #111;
        }
        .header {
            background-color: #252526;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5cacf7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        textarea {
            flex-grow: 1;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: none;
            resize: none;
            outline: none;
            line-height: 1.5;
        }
        .btn-run {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }
        .btn-run:hover { background-color: #45a049; }
        
        #preview-container {
            width: 55%;
            display: flex;
            flex-direction: column;
            background-color: #141414;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #gmod-screen {
            width: 90%;
            aspect-ratio: 16 / 9;
            background-image: url('https://raw.githubusercontent.com/glua/load-seed/master/app/images/background.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }
        #error-log {
            position: absolute;
            bottom: 10px;
            left: 5%;
            width: 90%;
            background: rgba(255, 0, 0, 0.2);
            color: #ff8888;
            border: 1px solid #ff3333;
            padding: 10px;
            font-family: monospace;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="editor-container">
        <div class="header">
            <span>GLua Code Editor</span>
            <button class="btn-run" onclick="updatePreview()">Update Preview</button>
        </div>
        <textarea id="code-input" spellcheck="false">surface.SetDrawColor(0, 0, 0, 150)
surface.DrawRect(50, 50, 300, 120)

surface.SetDrawColor(0, 150, 255, 255)
surface.DrawOutlinedRect(50, 50, 300, 120)

draw.SimpleText("GMod Web HUD", "DermaLarge", 70, 70, Color(255, 255, 255, 255))
draw.SimpleText("Health: 100", "DermaDefault", 70, 120, Color(255, 50, 50, 255))</textarea>
    </div>

    <div id="preview-container">
        <div class="header" style="position:absolute; top:0; width:100%; box-sizing:border-box;">gluaview - Game Mock</div>
        <canvas id="gmod-screen" width="1920" height="1080"></canvas>
        <div id="error-log"></div>
    </div>

    <script>
        const canvas = document.getElementById("gmod-screen");
        const ctx = canvas.getContext("2d");
        const errorLog = document.getElementById("error-log");

        function Color(r, g, b, a = 255) {
            return `rgba(${r}, ${g}, ${b}, ${a / 255})`;
        }

        const surface = {
            currentColor: "rgba(255,255,255,1)",
            SetDrawColor: function(r, g, b, a = 255) {
                this.currentColor = `rgba(${r}, ${g}, ${b}, ${a / 255})`;
            },
            DrawRect: function(x, y, w, h) {
                ctx.fillStyle = this.currentColor;
                ctx.fillRect(x, y, w, h);
            },
            DrawOutlinedRect: function(x, y, w, h) {
                ctx.strokeStyle = this.currentColor;
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);
            }
        };

        const draw = {
            SimpleText: function(text, font, x, y, colorStr, xAlign, yAlign) {
                ctx.fillStyle = colorStr || "white";
                
                if (font === "DermaLarge") ctx.font = "bold 32px sans-serif";
                else if (font === "DermaDefault") ctx.font = "18px sans-serif";
                else ctx.font = "24px sans-serif";

                ctx.textAlign = "left"; 
                ctx.textBaseline = "top";
                ctx.fillText(text, x, y);
            }
        };

        function updatePreview() {
            errorLog.style.display = "none";
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let rawLua = document.getElementById("code-input").value;

            try {
                let cleanJs = rawLua
                    .replace(/hook\.Add\s*\([^,]+,[^,]+,\s*function\s*\(\s*\)/g, "")
                    .replace(/end\s*\)\s*$/g, "") 
                    .replace(/local\s+/g, "let ")
                    .replace(/--.*/g, "");

                const execute = new Function('surface', 'draw', 'Color', cleanJs);
                execute(surface, draw, Color);

            } catch (err) {
                errorLog.innerText = "Syntax/Preview Error: " + err.message;
                errorLog.style.display = "block";
            }
        }

        window.onload = updatePreview;
    </script>
</body>
</html>
